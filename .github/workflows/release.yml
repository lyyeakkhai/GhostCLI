name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: .exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ""
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            ext: ""
          - os: darwin
            arch: amd64
            runner: macos-latest
            ext: ""
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          commit=$(git rev-parse --short HEAD)
          date=$(git log -1 --format=%cI)
          ldflags="-s -w \
            -X main.version=${{ env.VERSION }} \
            -X main.commit=$commit \
            -X main.buildDate=$date"
          go build -trimpath -ldflags "$ldflags" -o ghost${{ matrix.ext }} ./cmd/ghost

      - name: Compute checksum
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum ghost${{ matrix.ext }} > ghost-${{ matrix.os }}-${{ matrix.arch }}.sha256
          else
            shasum -a 256 ghost${{ matrix.ext }} > ghost-${{ matrix.os }}-${{ matrix.arch }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ghost${{ matrix.ext }}
            ghost-${{ matrix.os }}-${{ matrix.arch }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ghost-*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
